name: Weekly race brief

# Publishes the brief for that evening's Wed 6-8 PM Bristol Harbor race to the
# GitHub Pages journal. Fires at 12:30 PM EDT (16:30 UTC) on Wednesday, a few
# hours before the start. Cron is UTC with no DST — this is the racing-season
# (EDT) time; revisit if we ever race outside EDT.
on:
  schedule:
    - cron: "30 16 * * 3"   # 12:30 PM EDT (racing season)
  workflow_dispatch:        # manual run

permissions:
  contents: write           # push the generated brief + rebuilt docs/ back to main

concurrency:
  group: weekly-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r .claude/skills/race-brief/requirements.txt

      - name: Generate and publish the brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NWS_USER_AGENT: "starling-race-brief-ci"
        run: python .claude/skills/race-brief/weekly_brief.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add briefs/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly brief: $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi
